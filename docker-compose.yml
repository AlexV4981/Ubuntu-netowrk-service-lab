services:

  helpy-bot:
    build: .
    container_name: helpy-bot
    restart: unless-stopped

    user: "${UID}:${GID}"

    environment:
      MAVEN_CONFIG: /tmp/.m2

    env_file:
      - .env

    volumes:
      - ./ingest:/ingest
      - /home/titus-tech/mc-cobblemon/data/logs:/mc-logs:ro

    networks:
      - helpy-network

    stdin_open: true
    tty: true


  minecraft-controller:
    build:
      context: ./controller

    container_name: minecraft-controller
    restart: unless-stopped

    networks:
      - helpy-network

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./controller/data:/data

networks:

  helpy-network:
    name: helpy-network
